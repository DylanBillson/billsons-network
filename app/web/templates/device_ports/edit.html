{% extends "base.html" %}

{% block content %}

<div class="page-header">

    <div>
        <h1 style="margin: 0;">
            Edit Port
        </h1>

        <p style="color: var(--text-secondary); margin-bottom: 0;">
            Device: {{ device.name }}
        </p>
    </div>

    <a
        href="/devices/{{ device.id }}/ports"
        class="nav-button"
    >
        Back to Ports
    </a>

</div>

<div class="form-container">

    <div class="card">

        {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
        {% endif %}

        <form
            method="post"
            action="/devices/{{ device.id }}/ports/{{ port.id }}/edit"
        >

            <div class="form-group">
                <label
                    for="label"
                    class="form-label"
                >
                    Port Label
                </label>

                <input
                    type="text"
                    id="label"
                    name="label"
                    class="form-input"
                    value="{{ port.label }}"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label
                    for="sort_order"
                    class="form-label"
                >
                    Sort Order
                </label>

                <input
                    type="number"
                    id="sort_order"
                    name="sort_order"
                    class="form-input"
                    min="1"
                    value="{{ port.sort_order }}"
                    required
                >
            </div>

            <button
                type="submit"
                class="form-button"
            >
                Save Port
            </button>

        </form>

    </div>

</div>

{% endblock %}
