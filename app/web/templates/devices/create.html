{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <h1>Create Device</h1>

    <a href="/devices" class="nav-button">
        Back to Devices
    </a>
</div>

{% if not current_location %}

    <div class="card">
        <h2 style="margin-top: 0;">
            No Location Selected
        </h2>

        <p>
            Select or create a location before adding devices.
        </p>

        <a href="/admin/locations" class="nav-button">
            Manage Locations
        </a>
    </div>

{% else %}

    <div class="form-container">

        <div class="card">

            {% if error %}
                <div class="error-message">
                    {{ error }}
                </div>
            {% endif %}

            <form method="post" action="/devices/create">

                <div class="form-group">
                    <label for="name" class="form-label">
                        Device Name
                    </label>

                    <input
                        type="text"
                        id="name"
                        name="name"
                        class="form-input"
                        value="{{ form_data.name if form_data is defined else '' }}"
                        required
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="device_type_id" class="form-label">
                        Device Type
                    </label>

                    <select
                        id="device_type_id"
                        name="device_type_id"
                        class="form-input"
                        required
                    >
                        {% for device_type in device_types %}
                            <option
                                value="{{ device_type.id }}"
                                {% if form_data is defined and form_data.device_type_id == device_type.id %}selected{% endif %}
                            >
                                {{ device_type.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="manufacturer" class="form-label">
                        Manufacturer
                    </label>

                    <input
                        type="text"
                        id="manufacturer"
                        name="manufacturer"
                        class="form-input"
                        value="{{ form_data.manufacturer if form_data is defined else '' }}"
                    >
                </div>

                <div class="form-group">
                    <label for="model" class="form-label">
                        Model
                    </label>

                    <input
                        type="text"
                        id="model"
                        name="model"
                        class="form-input"
                        value="{{ form_data.model if form_data is defined else '' }}"
                    >
                </div>

                <div class="form-group">
                    <label for="serial_number" class="form-label">
                        Serial Number
                    </label>

                    <input
                        type="text"
                        id="serial_number"
                        name="serial_number"
                        class="form-input"
                        value="{{ form_data.serial_number if form_data is defined else '' }}"
                    >
                </div>

                <div class="form-group">
                    <label for="mac_address" class="form-label">
                        MAC Address
                    </label>

                    <input
                        type="text"
                        id="mac_address"
                        name="mac_address"
                        class="form-input"
                        value="{{ form_data.mac_address if form_data is defined else '' }}"
                    >
                </div>

                <div class="form-group">
                    <label for="ip_assignment_type" class="form-label">
                        IP Assignment Type
                    </label>

                    <select
                        id="ip_assignment_type"
                        name="ip_assignment_type"
                        class="form-input"
                    >
                        <option value="">None</option>
                        <option value="static" {% if form_data is defined and form_data.ip_assignment_type == "static" %}selected{% endif %}>Static</option>
                        <option value="reserved" {% if form_data is defined and form_data.ip_assignment_type == "reserved" %}selected{% endif %}>Reserved</option>
                        <option value="dhcp" {% if form_data is defined and form_data.ip_assignment_type == "dhcp" %}selected{% endif %}>DHCP</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="ip_address" class="form-label">
                        IP Address
                    </label>

                    <input
                        type="text"
                        id="ip_address"
                        name="ip_address"
                        class="form-input"
                        value="{{ form_data.ip_address if form_data is defined else '' }}"
                    >
                </div>

                <div class="form-group">
                    <label for="vlan_id" class="form-label">
                        VLAN
                    </label>

                    <select
                        id="vlan_id"
                        name="vlan_id"
                        class="form-input"
                    >
                        <option value="">None</option>

                        {% for vlan in vlans %}
                            <option
                                value="{{ vlan.id }}"
                                {% if form_data is defined and form_data.vlan_id|string == vlan.id|string %}selected{% endif %}
                            >
                                {{ vlan.name }} ({{ vlan.vlan_number }})
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="power_source" class="form-label">
                        Power Source
                    </label>

                    <select
                        id="power_source"
                        name="power_source"
                        class="form-input"
                    >
                        <option value="external_power" {% if form_data is not defined or form_data.power_source == "external_power" %}selected{% endif %}>
                            External Power
                        </option>
                        <option value="poe_powered" {% if form_data is defined and form_data.power_source == "poe_powered" %}selected{% endif %}>
                            PoE Powered
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="supplied_by" class="form-label">
                        Supplied By
                    </label>

                    <input
                        type="text"
                        id="supplied_by"
                        name="supplied_by"
                        class="form-input"
                        value="{{ form_data.supplied_by if form_data is defined else '' }}"
                    >
                </div>

                <div class="form-group">
                    <label for="purchase_date" class="form-label">
                        Purchase Date
                    </label>

                    <input
                        type="date"
                        id="purchase_date"
                        name="purchase_date"
                        class="form-input"
                        value="{{ form_data.purchase_date if form_data is defined else '' }}"
                    >
                </div>

                <div class="form-group">
                    <label for="status" class="form-label">
                        Device Status
                    </label>

                    <select
                        id="status"
                        name="status"
                        class="form-input"
                    >
                        <option value="active" {% if form_data is not defined or form_data.status == "active" %}selected{% endif %}>Active</option>
                        <option value="inactive" {% if form_data is defined and form_data.status == "inactive" %}selected{% endif %}>Inactive</option>
                        <option value="retired" {% if form_data is defined and form_data.status == "retired" %}selected{% endif %}>Retired</option>
                        <option value="faulty" {% if form_data is defined and form_data.status == "faulty" %}selected{% endif %}>Faulty</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="port_count" class="form-label">
                        Number of Ports
                    </label>

                    <input
                        type="number"
                        id="port_count"
                        name="port_count"
                        class="form-input"
                        min="0"
                        value="{{ form_data.port_count if form_data is defined else 0 }}"
                    >
                </div>

                <div class="form-group">
                    <label for="notes" class="form-label">
                        Notes
                    </label>

                    <textarea
                        id="notes"
                        name="notes"
                        class="form-textarea"
                    >{{ form_data.notes if form_data is defined else '' }}</textarea>
                </div>

                <button type="submit" class="form-button">
                    Create Device
                </button>

            </form>

        </div>

    </div>

{% endif %}

{% endblock %}
