{% extends "base.html" %}

{% block content %}

<div class="page-header">

    <h1>
        Edit SSID
    </h1>

    <div
        style="
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        "
    >

        <a
            href="/ssids/{{ ssid.id }}"
            class="nav-button"
        >
            View SSID
        </a>

        <a
            href="/ssids"
            class="nav-button"
        >
            Back to SSIDs
        </a>

    </div>

</div>

<div class="form-container">

    <div class="card">

        {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
        {% endif %}

        <form
            method="post"
            action="/ssids/{{ ssid.id }}/edit"
        >

            <div class="form-group">

                <label
                    for="name"
                    class="form-label"
                >
                    SSID Name
                </label>

                <input
                    type="text"
                    id="name"
                    name="name"
                    class="form-input"
                    value="{{ ssid.name }}"
                    required
                    autofocus
                >

            </div>

            <div class="form-group">

                <label
                    for="security_type"
                    class="form-label"
                >
                    Security Type
                </label>

                <select
                    id="security_type"
                    name="security_type"
                    class="form-input"
                >

                    <option value="">
                        None
                    </option>

                    <option
                        value="open"
                        {% if ssid.security_type == "open" %}selected{% endif %}
                    >
                        Open
                    </option>

                    <option
                        value="wpa2"
                        {% if ssid.security_type == "wpa2" %}selected{% endif %}
                    >
                        WPA2
                    </option>

                    <option
                        value="wpa3"
                        {% if ssid.security_type == "wpa3" %}selected{% endif %}
                    >
                        WPA3
                    </option>

                    <option
                        value="wpa2_wpa3"
                        {% if ssid.security_type == "wpa2_wpa3" %}selected{% endif %}
                    >
                        WPA2/WPA3 Mixed
                    </option>

                </select>

            </div>

            <div class="card" style="margin-bottom: 20px;">

                <h3 style="margin-top: 0;">
                    Password Management
                </h3>

                <p style="color: var(--text-secondary);">
                    Leave blank to keep the existing password.
                </p>

                <label
                    style="
                        display: flex;
                        align-items: center;
                        gap: 10px;
                        margin-bottom: 15px;
                    "
                >
                    <input
                        type="checkbox"
                        name="update_password"
                        value="true"
                    >

                    Replace Existing Password
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input"
                    placeholder="New Wi-Fi password"
                >

            </div>

            <div class="form-group">

                <label
                    for="vlan_id"
                    class="form-label"
                >
                    VLAN
                </label>

                <select
                    id="vlan_id"
                    name="vlan_id"
                    class="form-input"
                >

                    <option value="">
                        None
                    </option>

                    {% for vlan in vlans %}

                        <option
                            value="{{ vlan.id }}"
                            {% if ssid.vlan_id == vlan.id %}selected{% endif %}
                        >
                            VLAN {{ vlan.vlan_number }} - {{ vlan.name }}
                        </option>

                    {% endfor %}

                </select>

            </div>

            <div class="form-group">

                <label
                    for="notes"
                    class="form-label"
                >
                    Notes
                </label>

                <textarea
                    id="notes"
                    name="notes"
                    class="form-textarea"
                >{{ ssid.notes or '' }}</textarea>

            </div>

            <button
                type="submit"
                class="form-button"
            >
                Save Changes
            </button>

        </form>

    </div>

</div>

{% endblock %}
