{% extends "base.html" %}

{% block content %}

<div class="form-container">

    <div class="card">

        <h1 style="margin-top: 0;">
            Login
        </h1>

        <p style="color: var(--text-secondary);">
            Sign in to Billson's Network.
        </p>

        {% if error %}

            <div class="error-message">
                {{ error }}
            </div>

        {% endif %}

        <form method="post" action="/login">

            <div class="form-group">

                <label
                    for="username"
                    class="form-label"
                >
                    Username
                </label>

                <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-input"
                    required
                    autofocus
                >

            </div>

            <div class="form-group">

                <label
                    for="password"
                    class="form-label"
                >
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input"
                    required
                >

            </div>

            <button
                type="submit"
                class="form-button"
            >
                Login
            </button>

        </form>

    </div>

</div>

{% endblock %}
