{% extends "base.html" %}

{% block content %}

<div class="page-header">

    <div>
        <h1 style="margin: 0;">
            Edit Cable {{ cable.cable_id }}
        </h1>

        {% if current_location %}
            <p style="color: var(--text-secondary); margin-bottom: 0;">
                Location: {{ current_location.name }}
            </p>
        {% endif %}
    </div>

    <a href="/cables" class="nav-button">
        Back to Cables
    </a>

</div>

<div class="form-container" style="max-width: 900px;">

    <div class="card">

        {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
        {% endif %}

        <form method="post" action="/cables/{{ cable.id }}/edit">

            <div class="form-group">
                <label class="form-label" for="cable_id">
                    Cable ID
                </label>

                <input
                    type="text"
                    id="cable_id"
                    name="cable_id"
                    class="form-input"
                    placeholder="X305"
                    value="{{ form_data.cable_id if form_data is defined else cable.cable_id }}"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="from_port_id">
                    From Port
                </label>

                <select id="from_port_id" name="from_port_id" class="form-input">
                    <option value="">-- Not Connected --</option>

                    {% for port in ports %}
                        <option
                            value="{{ port.id }}"
                            {% if form_data is defined %}
                                {% if form_data.from_port_id == port.id|string %}selected{% endif %}
                            {% else %}
                                {% if cable.from_port_id == port.id %}selected{% endif %}
                            {% endif %}
                        >
                            {{ port.device.name }} / {{ port.label }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="to_port_id">
                    To Port
                </label>

                <select id="to_port_id" name="to_port_id" class="form-input">
                    <option value="">-- Not Connected --</option>

                    {% for port in ports %}
                        <option
                            value="{{ port.id }}"
                            {% if form_data is defined %}
                                {% if form_data.to_port_id == port.id|string %}selected{% endif %}
                            {% else %}
                                {% if cable.to_port_id == port.id %}selected{% endif %}
                            {% endif %}
                        >
                            {{ port.device.name }} / {{ port.label }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="cable_type">
                    Cable Type
                </label>

                <input
                    type="text"
                    id="cable_type"
                    name="cable_type"
                    class="form-input"
                    placeholder="Cat6"
                    value="{{ form_data.cable_type if form_data is defined else cable.cable_type or '' }}"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="length">
                    Length
                </label>

                <input
                    type="text"
                    id="length"
                    name="length"
                    class="form-input"
                    placeholder="5m"
                    value="{{ form_data.length if form_data is defined else cable.length or '' }}"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="colour">
                    Colour
                </label>

                <input
                    type="text"
                    id="colour"
                    name="colour"
                    class="form-input"
                    placeholder="Blue"
                    value="{{ form_data.colour if form_data is defined else cable.colour or '' }}"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="cable_supplied_by">
                    Supplied By
                </label>

                <input
                    type="text"
                    id="cable_supplied_by"
                    name="cable_supplied_by"
                    class="form-input"
                    value="{{ form_data.cable_supplied_by if form_data is defined else cable.cable_supplied_by or '' }}"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="installed_date">
                    Installed Date
                </label>

                <input
                    type="date"
                    id="installed_date"
                    name="installed_date"
                    class="form-input"
                    value="{{ form_data.installed_date if form_data is defined else cable.installed_date.isoformat() if cable.installed_date else '' }}"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="status">
                    Status
                </label>

                <select id="status" name="status" class="form-input">
                    {% set selected_status = form_data.status if form_data is defined else cable.status %}

                    <option value="active" {% if selected_status == "active" %}selected{% endif %}>
                        Active
                    </option>

                    <option value="inactive" {% if selected_status == "inactive" %}selected{% endif %}>
                        Inactive
                    </option>

                    <option value="retired" {% if selected_status == "retired" %}selected{% endif %}>
                        Retired
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="last_tested_status">
                    Test Status
                </label>

                <select
                    id="last_tested_status"
                    name="last_tested_status"
                    class="form-input"
                >
                    {% set selected_test_status = form_data.last_tested_status if form_data is defined else cable.last_tested_status or "" %}

                    <option value="" {% if selected_test_status == "" %}selected{% endif %}>
                        Not Set
                    </option>

                    <option value="not_tested" {% if selected_test_status == "not_tested" %}selected{% endif %}>
                        Not Tested
                    </option>

                    <option value="pass" {% if selected_test_status == "pass" %}selected{% endif %}>
                        Pass
                    </option>

                    <option value="fail" {% if selected_test_status == "fail" %}selected{% endif %}>
                        Fail
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="last_tested_date">
                    Last Tested Date
                </label>

                <input
                    type="date"
                    id="last_tested_date"
                    name="last_tested_date"
                    class="form-input"
                    value="{{ form_data.last_tested_date if form_data is defined else cable.last_tested_date.isoformat() if cable.last_tested_date else '' }}"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="route_notes">
                    Route Notes
                </label>

                <textarea
                    id="route_notes"
                    name="route_notes"
                    class="form-textarea"
                >{{ form_data.route_notes if form_data is defined else cable.route_notes or '' }}</textarea>
            </div>

            <button type="submit" class="form-button">
                Save Cable
            </button>

        </form>

    </div>

</div>

{% endblock %}
